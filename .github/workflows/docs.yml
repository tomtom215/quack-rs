name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and mdBook binary
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c6158d # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}

      - name: Install mdBook
        run: |
          if ! command -v mdbook &>/dev/null; then
            echo "Installing mdBook ${{ env.MDBOOK_VERSION }}..."
            cargo install mdbook --locked --version "${{ env.MDBOOK_VERSION }}"
          else
            echo "mdBook $(mdbook --version) already cached."
          fi

      - name: Build documentation
        run: mdbook build

      - name: Write build summary
        run: |
          PAGE_COUNT=$(find book/book -name '*.html' | wc -l)
          {
            echo "## Documentation built successfully"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| mdBook version | \`${{ env.MDBOOK_VERSION }}\` |"
            echo "| HTML pages generated | \`${PAGE_COUNT}\` |"
            echo "| Output directory | \`book/book/\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@d5606572c479bee637007364c6b4800ac4fc8573 # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: book/book

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03 # v4.0.5

      - name: Write deploy summary
        run: |
          {
            echo "## Documentation deployed"
            echo ""
            echo "Live at: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
