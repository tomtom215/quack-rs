<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%"   stop-color="#111927"/>
      <stop offset="100%" stop-color="#060C14"/>
    </linearGradient>
    <radialGradient id="dg" cx="62%" cy="24%" r="68%">
      <stop offset="0%"   stop-color="#FFF2A8"/>
      <stop offset="38%"  stop-color="#F5C420"/>
      <stop offset="100%" stop-color="#A87200"/>
    </radialGradient>
    <!-- Subtle radial glow behind duck -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5C840" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F5C840" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-30%" y="-30%" width="190%" height="190%">
      <feDropShadow dx="0" dy="10" stdDeviation="16"
                    flood-color="#000" flood-opacity="0.62"/>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="400" height="400" rx="68" fill="url(#bg)"/>

  <!-- Warm glow -->
  <ellipse cx="200" cy="168" rx="140" ry="100" fill="url(#glow)"/>

  <g filter="url(#ds)">
    <!--
      Scale 1.1× and translate to position the duck centred in the upper
      two-thirds of the 400×400 icon.
      translate(74,41) scale(1.1) → body centre lands at ~(200,162),
      bill tip at ~(314,122), belly bottom at ~(188,210), tail tip at ~(105,136).
    -->
    <g transform="translate(74,41) scale(1.1)">
      <path d="
        M 28,86
        C 32,78  40,72  56,70
        C 68,68  82,66  96,66
        C 110,66 120,68 126,72
        C 132,76 132,56 142,46
        C 150,38 160,34 170,38
        C 178,40 184,50 190,56
        C 200,60 212,68 218,74
        C 220,76 220,78 218,80
        C 214,82 200,84 186,84
        C 180,88 176,96 174,106
        C 174,118 182,138 166,148
        C 154,154 130,157 104,153
        C 78,149  56,140  42,125
        C 36,116  30,106  28,100
        C 28,96   28,92   28,86
        Z
      " fill="url(#dg)" stroke="none"/>

      <!-- Bill -->
      <path d="
        M 186,84
        C 184,76 186,66 188,57
        C 200,59 212,67 218,74
        C 220,76 220,78 218,80
        C 212,82 200,84 186,84
        Z
      " fill="#E06818" stroke="none"/>

      <!-- Wing fold crescent -->
      <path d="M 86,104 C 106,90 134,90 156,108 C 132,102 106,102 86,104 Z"
            fill="#A87200" opacity="0.28" stroke="none"/>

      <!-- Neck-body junction shadow -->
      <path d="M 104,99 Q 132,80 160,102 Q 132,95 104,99 Z"
            fill="#A87200" opacity="0.22" stroke="none"/>

      <!-- Wing-tip accent stroke -->
      <path d="M 90,107 C 112,95 136,95 158,110"
            fill="none" stroke="#8A6000" stroke-width="1.8"
            stroke-linecap="round" opacity="0.35"/>

      <!-- Eye -->
      <circle cx="164" cy="54" r="5.5" fill="#0D1117" stroke="none"/>
      <circle cx="166" cy="51" r="2.1" fill="white"   stroke="none"/>

      <!-- Brow highlight -->
      <ellipse cx="148" cy="52" rx="8" ry="5.2"
               transform="rotate(-30,148,52)"
               fill="white" opacity="0.18" stroke="none"/>

      <!-- Body specular -->
      <ellipse cx="115" cy="86" rx="14" ry="8"
               transform="rotate(-20,115,86)"
               fill="white" opacity="0.10" stroke="none"/>
    </g>
  </g>

  <!--
    Water ripples: duck belly bottom ≈ 157×1.1 + 41 = 213.7
    Centred on duck body x ≈ 115×1.1 + 74 = 200.5.
  -->
  <ellipse cx="200" cy="222" rx="88" ry="8.0"
           fill="none" stroke="#243C58" stroke-width="2.2" opacity="0.68"/>
  <ellipse cx="200" cy="233" rx="62" ry="5.8"
           fill="none" stroke="#243C58" stroke-width="1.6" opacity="0.46"/>
  <ellipse cx="200" cy="242" rx="38" ry="3.8"
           fill="none" stroke="#243C58" stroke-width="1.0" opacity="0.28"/>

  <!-- Wordmark centred -->
  <text x="228" y="340"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="50" font-weight="700"
        letter-spacing="-1.5" text-anchor="end"
        fill="#E6EDF3">quack</text>
  <text x="228" y="340"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="50" font-weight="700"
        letter-spacing="-1.5" text-anchor="start"
        fill="#CE422B">-rs</text>
</svg>
