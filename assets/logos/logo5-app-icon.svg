<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#111927"/>
      <stop offset="100%" stop-color="#060C14"/>
    </linearGradient>
    <radialGradient id="dg" cx="60%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#FFE870"/>
      <stop offset="100%" stop-color="#C08A06"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="48%">
      <stop offset="0%"   stop-color="#F5C842" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-30%" y="-30%" width="190%" height="190%">
      <feDropShadow dx="0" dy="10" stdDeviation="16"
                    flood-color="#000" flood-opacity="0.60"/>
    </filter>
  </defs>

  <rect width="400" height="400" rx="68" fill="url(#bg)"/>

  <!-- Duck centred -->
  
  <g filter="url(#ds)">
    <path d="M 134.6,170.0 C 120.4,151.6 114.2,125.1 128.5,112.9 C 142.8,108.8 151.0,125.1 146.9,147.6 C 142.8,161.8  136.7,168.0  134.6,170.0 Z" fill="url(#dg)" stroke="none"/>
    <ellipse cx="204.0" cy="170.0" rx="69.4" ry="46.9"
             transform="rotate(-4,204.0,170.0)"
             fill="url(#dg)" stroke="none"/>
    <circle  cx="257.0" cy="127.2" r="32.6"
             fill="url(#dg)" stroke="none"/>
    <path d="M 281.5,118.0 Q 321.3,118.0 316.2,128.2 Q 321.3,140.4 281.5,140.4 Q 275.4,127.2 281.5,118.0 Z" fill="#E06010" stroke="none"/>
    <circle  cx="262.1" cy="117.0" r="6.6" fill="#0D1117" stroke="none"/>
    <circle  cx="264.7" cy="114.1" r="2.5" fill="white" stroke="none"/>
    <path d="M 185.6,178.2 Q 222.4,156.7 255.0,178.2"
          fill="none" stroke="#C88E08" stroke-width="2.9"
          stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Water ripples snug under the duck body -->
  <ellipse cx="196" cy="238" rx="90" ry="9"
           fill="none" stroke="#243C58" stroke-width="2.2" opacity="0.65"/>
  <ellipse cx="196" cy="248" rx="64" ry="6.5"
           fill="none" stroke="#243C58" stroke-width="1.6" opacity="0.45"/>
  <ellipse cx="196" cy="256" rx="40" ry="4.5"
           fill="none" stroke="#243C58" stroke-width="1.0" opacity="0.30"/>

  <!-- Split anchored at 228 so the full "quack-rs" is visually centred -->
  <text x="228" y="348"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="50" font-weight="800" letter-spacing="-1.5"
        text-anchor="end" fill="#F0F6FC">quack</text>
  <text x="228" y="348"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="50" font-weight="800" letter-spacing="-1.5"
        text-anchor="start" fill="#CE422B">-rs</text>
</svg>