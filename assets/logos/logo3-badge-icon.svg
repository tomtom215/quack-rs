<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <defs>
    <radialGradient id="bgr" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1C2330"/>
      <stop offset="100%" stop-color="#080C14"/>
    </radialGradient>
    <radialGradient id="dg" cx="60%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#FFE870"/>
      <stop offset="100%" stop-color="#B88008"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5C540"/>
      <stop offset="100%" stop-color="#CE422B"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12"
                    flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="circ">
      <circle cx="180" cy="180" r="178"/>
    </clipPath>
  </defs>

  <circle cx="180" cy="180" r="180" fill="url(#bgr)"/>
  <circle cx="180" cy="180" r="171"
          fill="none" stroke="url(#ring)" stroke-width="5"/>

  <!-- Duck: centred slightly above middle to leave room for label -->
  <g clip-path="url(#circ)">
    
  <g filter="url(#ds)">
    <path d="M 113.5,160.0 C 101.5,144.5 96.3,122.2 108.4,111.8 C 120.4,108.4 127.3,122.2 123.8,141.1 C 120.4,153.1  115.2,158.3  113.5,160.0 Z" fill="url(#dg)" stroke="none"/>
    <ellipse cx="172.0" cy="160.0" rx="58.5" ry="39.6"
             transform="rotate(-4,172.0,160.0)"
             fill="url(#dg)" stroke="none"/>
    <circle  cx="216.7" cy="123.9" r="27.5"
             fill="url(#dg)" stroke="none"/>
    <path d="M 237.4,116.1 Q 270.9,116.1 266.6,124.7 Q 270.9,135.1 237.4,135.1 Q 232.2,123.9 237.4,116.1 Z" fill="#E06010" stroke="none"/>
    <circle  cx="221.0" cy="115.3" r="5.6" fill="#0D1117" stroke="none"/>
    <circle  cx="223.2" cy="112.9" r="2.1" fill="white" stroke="none"/>
    <path d="M 156.5,166.9 Q 187.5,148.8 215.0,166.9"
          fill="none" stroke="#C88E08" stroke-width="2.4"
          stroke-linecap="round" opacity="0.55"/>
  </g>
  </g>

  <!-- Label at bottom -->
  <!-- Split at 199 so full "quack-rs" is visually centred in the 360px badge -->
  <text x="199" y="318"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5"
        text-anchor="end" fill="#F0F6FC">quack</text>
  <text x="199" y="318"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5"
        text-anchor="start" fill="#CE422B">-rs</text>
</svg>