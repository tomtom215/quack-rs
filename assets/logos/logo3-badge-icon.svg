<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <defs>
    <radialGradient id="bgr" cx="38%" cy="34%" r="68%">
      <stop offset="0%"   stop-color="#1C2330"/>
      <stop offset="100%" stop-color="#080C14"/>
    </radialGradient>
    <radialGradient id="dg" cx="62%" cy="24%" r="68%">
      <stop offset="0%"   stop-color="#FFF2A8"/>
      <stop offset="38%"  stop-color="#F5C420"/>
      <stop offset="100%" stop-color="#A87200"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5C840"/>
      <stop offset="100%" stop-color="#D4A020"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12"
                    flood-color="#000" flood-opacity="0.60"/>
    </filter>
    <clipPath id="circ">
      <circle cx="180" cy="180" r="179"/>
    </clipPath>
  </defs>

  <!-- Background disc -->
  <circle cx="180" cy="180" r="180" fill="url(#bgr)"/>

  <!-- Outer ring (gold gradient) -->
  <circle cx="180" cy="180" r="175"
          fill="none" stroke="url(#ring1)" stroke-width="4.5"/>
  <!-- Inner accent ring (rust) -->
  <circle cx="180" cy="180" r="168"
          fill="none" stroke="#CE422B" stroke-width="1.5" opacity="0.5"/>

  <!-- Duck clipped to circle -->
  <g clip-path="url(#circ)">
    <g filter="url(#ds)">
      <!-- Translate to centre-upper area of the 360×360 badge.
           Base duck: x 28–220, y 36–157.  translate(62,40) centres it well. -->
      <g transform="translate(62,40)">
        <path d="
          M 28,86
          C 32,78  40,72  56,70
          C 68,68  82,66  96,66
          C 110,66 120,68 126,72
          C 132,76 132,56 142,46
          C 150,38 160,34 170,38
          C 178,40 184,50 190,56
          C 200,60 212,68 218,74
          C 220,76 220,78 218,80
          C 214,82 200,84 186,84
          C 180,88 176,96 174,106
          C 174,118 182,138 166,148
          C 154,154 130,157 104,153
          C 78,149  56,140  42,125
          C 36,116  30,106  28,100
          C 28,96   28,92   28,86
          Z
        " fill="url(#dg)" stroke="none"/>

        <!-- Bill -->
        <path d="
          M 186,84
          C 184,76 186,66 188,57
          C 200,59 212,67 218,74
          C 220,76 220,78 218,80
          C 212,82 200,84 186,84
          Z
        " fill="#E06818" stroke="none"/>

        <!-- Wing fold crescent -->
        <path d="M 86,104 C 106,90 134,90 156,108 C 132,102 106,102 86,104 Z"
              fill="#A87200" opacity="0.28" stroke="none"/>

        <!-- Neck-body junction shadow -->
        <path d="M 104,99 Q 132,80 160,102 Q 132,95 104,99 Z"
              fill="#A87200" opacity="0.22" stroke="none"/>

        <!-- Wing-tip accent stroke -->
        <path d="M 90,107 C 112,95 136,95 158,110"
              fill="none" stroke="#8A6000" stroke-width="1.8"
              stroke-linecap="round" opacity="0.35"/>

        <!-- Eye -->
        <circle cx="164" cy="54" r="5.5" fill="#0D1117" stroke="none"/>
        <circle cx="166" cy="51" r="2.1" fill="white"   stroke="none"/>

        <!-- Brow highlight -->
        <ellipse cx="148" cy="52" rx="8" ry="5.2"
                 transform="rotate(-30,148,52)"
                 fill="white" opacity="0.18" stroke="none"/>

        <!-- Body specular -->
        <ellipse cx="115" cy="86" rx="14" ry="8"
                 transform="rotate(-20,115,86)"
                 fill="white" opacity="0.10" stroke="none"/>
      </g>
    </g>
  </g>

  <!-- Water ripples centred on duck body (body cx ≈ 115+62 = 177 after translate) -->
  <ellipse cx="172" cy="210" rx="72" ry="7.5"
           fill="none" stroke="#2A4060" stroke-width="2.0" opacity="0.70"/>
  <ellipse cx="172" cy="221" rx="50" ry="5.5"
           fill="none" stroke="#2A4060" stroke-width="1.4" opacity="0.48"/>
  <ellipse cx="172" cy="230" rx="30" ry="3.5"
           fill="none" stroke="#2A4060" stroke-width="0.9" opacity="0.28"/>

  <!-- Label centred in badge -->
  <text x="203" y="314"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="40" font-weight="700"
        letter-spacing="-0.5" text-anchor="end"
        fill="#E6EDF3">quack</text>
  <text x="203" y="314"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="40" font-weight="700"
        letter-spacing="-0.5" text-anchor="start"
        fill="#CE422B">-rs</text>
</svg>
