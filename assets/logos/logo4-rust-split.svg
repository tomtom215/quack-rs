<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 210" width="660" height="210">
  <defs>
    <!-- Duck gold: slightly warmer/more orange to harmonise with the ember bg -->
    <radialGradient id="dg" cx="62%" cy="24%" r="68%">
      <stop offset="0%"   stop-color="#FFF4B0"/>
      <stop offset="38%"  stop-color="#F0B818"/>
      <stop offset="100%" stop-color="#9E6A00"/>
    </radialGradient>
    <filter id="ds" x="-25%" y="-25%" width="175%" height="175%">
      <feDropShadow dx="0" dy="5" stdDeviation="10"
                    flood-color="#2A0800" flood-opacity="0.55"/>
    </filter>
    <!-- Background: deep charcoal with a warm ember wash on the left -->
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2A1208"/>
      <stop offset="42%"  stop-color="#1A100A"/>
      <stop offset="100%" stop-color="#111622"/>
    </linearGradient>
    <!-- Ember radial: extra warmth pooled where the duck lives -->
    <radialGradient id="ember" cx="24%" cy="50%" r="44%">
      <stop offset="0%"   stop-color="#7A2C10" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7A2C10" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="full">
      <rect width="660" height="210" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#full)">
    <rect width="660" height="210" fill="url(#bg4)"/>
    <rect width="660" height="210" fill="url(#ember)"/>
  </g>

  <g filter="url(#ds)">
    <g transform="translate(2,2)">
      <path d="
        M 28,86
        C 32,78  40,72  56,70
        C 68,68  82,66  96,66
        C 110,66 120,68 126,72
        C 132,76 132,56 142,46
        C 150,38 160,34 170,38
        C 178,40 184,50 190,56
        C 200,60 212,68 218,74
        C 220,76 220,78 218,80
        C 214,82 200,84 186,84
        C 180,88 176,96 174,106
        C 174,118 182,138 166,148
        C 154,154 130,157 104,153
        C 78,149  56,140  42,125
        C 36,116  30,106  28,100
        C 28,96   28,92   28,86
        Z
      " fill="url(#dg)" stroke="none"/>

      <!-- Bill (slightly redder orange to match ember palette) -->
      <path d="
        M 186,84
        C 184,76 186,66 188,57
        C 200,59 212,67 218,74
        C 220,76 220,78 218,80
        C 212,82 200,84 186,84
        Z
      " fill="#E06418" stroke="none"/>

      <!-- Wing fold crescent -->
      <path d="M 86,104 C 106,90 134,90 156,108 C 132,102 106,102 86,104 Z"
            fill="#9E6A00" opacity="0.28" stroke="none"/>

      <!-- Neck-body junction shadow -->
      <path d="M 104,99 Q 132,80 160,102 Q 132,95 104,99 Z"
            fill="#9E6A00" opacity="0.22" stroke="none"/>

      <!-- Wing-tip accent stroke -->
      <path d="M 90,107 C 112,95 136,95 158,110"
            fill="none" stroke="#7A5200" stroke-width="1.8"
            stroke-linecap="round" opacity="0.35"/>

      <!-- Eye -->
      <circle cx="164" cy="54" r="5.5" fill="#0D1117" stroke="none"/>
      <circle cx="166" cy="51" r="2.1" fill="white"   stroke="none"/>

      <!-- Brow highlight -->
      <ellipse cx="148" cy="52" rx="8" ry="5.2"
               transform="rotate(-30,148,52)"
               fill="white" opacity="0.18" stroke="none"/>

      <!-- Body specular -->
      <ellipse cx="115" cy="86" rx="14" ry="8"
               transform="rotate(-20,115,86)"
               fill="white" opacity="0.10" stroke="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="234" y="122"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="80" font-weight="700"
        letter-spacing="-2">
    <tspan fill="#E6EDF3">quack</tspan><tspan fill="#D4563C">-rs</tspan>
  </text>

  <!-- Tagline -->
  <text x="236" y="151"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="15" font-weight="400"
        letter-spacing="2.0" fill="#7A8898">DUCKDB · EXTENSIONS</text>
</svg>
