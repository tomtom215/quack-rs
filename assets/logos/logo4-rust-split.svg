<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 210" width="660" height="210">
  <defs>
    <!-- Duck gold — slightly warmer/more orange to harmonise with the ember bg -->
    <radialGradient id="dg" cx="62%" cy="24%" r="68%">
      <stop offset="0%"   stop-color="#FFF4B0"/>
      <stop offset="38%"  stop-color="#F0B818"/>
      <stop offset="100%" stop-color="#9E6A00"/>
    </radialGradient>
    <filter id="ds" x="-25%" y="-25%" width="175%" height="175%">
      <feDropShadow dx="0" dy="5" stdDeviation="10"
                    flood-color="#2A0800" flood-opacity="0.55"/>
    </filter>
    <!-- Background: deep charcoal with a warm ember wash on the left -->
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2A1208"/>
      <stop offset="42%"  stop-color="#1A100A"/>
      <stop offset="100%" stop-color="#111622"/>
    </linearGradient>
    <!-- Ember radial: extra warmth pooled where the duck lives -->
    <radialGradient id="ember" cx="24%" cy="50%" r="44%">
      <stop offset="0%"   stop-color="#7A2C10" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7A2C10" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="full">
      <rect width="660" height="210" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#full)">
    <!-- Dark background with horizontal warm fade -->
    <rect width="660" height="210" fill="url(#bg4)"/>
    <!-- Radial ember pool behind the duck -->
    <rect width="660" height="210" fill="url(#ember)"/>
  </g>

  
  <g filter="url(#ds)">
    <path d="M 52,112 C 40,94 22,66 26,48 C 30,34 42,32 50,42 C 56,50 58,74 56,96 Z" fill="url(#dg)" stroke="none"/>
    <ellipse cx="110.00" cy="108.00" rx="62.56" ry="42.32"
             transform="rotate(-4,110.00,108.00)"
             fill="url(#dg)" stroke="none"/>
    <path d="M 102.64,106.16 Q 126.56,82.24 156.00,106.16 Q 126.56,98.80 102.64,106.16 Z" fill="#9E6A00" opacity="0.28" stroke="none"/>
    <path d="M 78,90 Q 114,76 154,88" fill="none" stroke="#8B5600" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <path d="M 176,59 Q 216,56 219,70 Q 216,84 176,81 Z" fill="#E06418" stroke="none"/>
    <circle  cx="157.84" cy="69.36" r="29.44"
             fill="url(#dg)" stroke="none"/>
    <circle  cx="162.44" cy="60.16" r="5.98"
             fill="#0D1117" stroke="none"/>
    <circle  cx="164.74" cy="57.58" r="2.30"
             fill="white" stroke="none"/>
    <ellipse cx="148.64" cy="56.48"
             rx="8.28" ry="5.52"
             transform="rotate(-30,148.64,56.48)"
             fill="white" opacity="0.18" stroke="none"/>
    <ellipse cx="117.36" cy="84.08"
             rx="14.72" ry="8.28"
             transform="rotate(-20,117.36,84.08)"
             fill="white" opacity="0.10" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="234" y="122"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="80" font-weight="700"
        letter-spacing="-2">
    <tspan fill="#E6EDF3">quack</tspan><tspan fill="#D4563C">-rs</tspan>
  </text>

  <!-- Tagline — warm slate, readable -->
  <text x="236" y="151"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="15" font-weight="400"
        letter-spacing="2.0" fill="#7A8898">DUCKDB · EXTENSIONS</text>
</svg>