<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 210" width="660" height="210">
  <defs>
    <radialGradient id="dg" cx="62%" cy="24%" r="68%">
      <stop offset="0%"   stop-color="#FFF8D0"/>
      <stop offset="38%"  stop-color="#F5D050"/>
      <stop offset="100%" stop-color="#C8A020"/>
    </radialGradient>
    <filter id="ds" x="-25%" y="-25%" width="175%" height="175%">
      <feDropShadow dx="0" dy="5" stdDeviation="10"
                    flood-color="#4A0800" flood-opacity="0.50"/>
    </filter>
    <!-- Gradient for the panel divider: rust → transparent (softens the edge) -->
    <linearGradient id="divgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6A1400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6A1400" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="full">
      <rect width="660" height="210" rx="22"/>
    </clipPath>
  </defs>

  <!-- Two colour panels clipped to rounded rect -->
  <g clip-path="url(#full)">
    <rect x="0"        y="0" width="212"       height="210" fill="#AA2610"/>
    <rect x="212"  y="0" width="448"   height="210" fill="#16100C"/>
  </g>

  <!-- Soft divider: 8 px gradient strip instead of hard line -->
  <rect x="211" y="0" width="8" height="210"
        fill="url(#divgrad)" clip-path="url(#full)"/>

  
  <g filter="url(#ds)">
    <path d="M 47.44,109.84 C 30.88,95.12   23.52,62.00   38.24,47.28 C 51.12,38.08   64.00,54.64   60.32,80.40 C 56.64,96.96   51.12,105.24   47.44,109.84 Z" fill="url(#dg)" stroke="none"/>
    <ellipse cx="110.00" cy="108.00" rx="62.56" ry="42.32"
             transform="rotate(-4,110.00,108.00)"
             fill="url(#dg)" stroke="none"/>
    <circle  cx="157.84" cy="69.36" r="29.44"
             fill="url(#dg)" stroke="none"/>
    <path d="M 102.64,106.16 Q 126.56,82.24 156.00,106.16 Q 126.56,98.80 102.64,106.16 Z" fill="#C8A020" opacity="0.28" stroke="none"/>
    <path d="M 179.92,60.16 Q 218.56,60.16 214.88,70.28 Q 218.56,82.24 179.92,82.24 Q 174.40,71.20 179.92,60.16 Z" fill="#FF8A20" stroke="none"/>
    <circle  cx="162.44" cy="60.16" r="5.98"
             fill="#0D1117" stroke="none"/>
    <circle  cx="164.74" cy="57.58" r="2.30"
             fill="white" stroke="none"/>
    <ellipse cx="148.64" cy="56.48"
             rx="8.28" ry="5.52"
             transform="rotate(-30,148.64,56.48)"
             fill="white" opacity="0.18" stroke="none"/>
    <ellipse cx="117.36" cy="84.08"
             rx="14.72" ry="8.28"
             transform="rotate(-20,117.36,84.08)"
             fill="white" opacity="0.10" stroke="none"/>
  </g>

  <!-- Wordmark on dark panel -->
  <text x="234" y="122"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="80" font-weight="700"
        letter-spacing="-2">
    <tspan fill="#F5EAE0">quack</tspan><tspan fill="#FF6644">-rs</tspan>
  </text>

  <!-- Tagline — fixed contrast (#907060 vs old near-invisible #5A4040) -->
  <text x="236" y="151"
        font-family="'Liberation Sans', Arial, sans-serif" font-size="15" font-weight="400"
        letter-spacing="2.0" fill="#907060">DUCKDB · EXTENSIONS</text>
</svg>